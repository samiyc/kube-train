# Deployment GKE — image depuis Artifact Registry
# Pour Minikube, utiliser deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-train-deployment
  labels:
    app: kube-train
spec:
  replicas: 1  # GKE Autopilot quota gratuit : 1 replica au démarrage
  # Quota limité : on tue l'ancien pod AVANT de créer le nouveau (évite 2 pods simultanés)
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0        # Ne pas créer de pod supplémentaire pendant la mise à jour
      maxUnavailable: 1  # Autoriser 1 pod indisponible (l'ancien se termine en premier)
  selector:
    matchLabels:
      app: kube-train-pod
  template:
    metadata:
      labels:
        app: kube-train-pod
    spec:
      containers:
      - name: api-container
        image: IMAGE_TAG_PLACEHOLDER
        # GKE pull depuis Artifact Registry (auth gérée automatiquement par GKE)
        # IMAGE_TAG_PLACEHOLDER est remplacé dynamiquement par GitHub Actions (git SHA)
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        
        #HPA
        resources:
          requests:
            cpu: "200m"     # Il réserve 0.2 CPU au démarrage
            memory: "256Mi" # Il réserve 256 Mo de RAM
          limits:
            cpu: "500m"     # Il ne pourra jamais dépasser 0.5 CPU (sinon il est bridé)
            memory: "512Mi" # S'il dépasse 512 Mo, Kubernetes le tue (OOMKilled)
        
        #Pod startup check
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 15   # Attendre 15s avant de commencer à vérifier (laisser le temps à Java de boot)
          periodSeconds: 10         # Vérifier toutes les 10s
        #Pod alive check
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 10   # Commencer à vérifier après 10s
          periodSeconds: 5          # Vérifier souvent
          failureThreshold: 3       # Si ça échoue 3 fois, on coupe le trafic
        
        # Injection en masse (ConfigMap + Secrets)
        envFrom:
          - configMapRef:
              name: kube-train-config
          - secretRef:
              name: kube-train-secrets
        
        # Injection manuelle (Mapping explicite)
        env:
        - name: TRAIN_API_KEY  # On renomme ici pour matcher "train.api.key" du Java
          valueFrom:
            secretKeyRef:
              name: kube-train-secrets
              key: API_KEY # La clé DANS le secret reste "API_KEY", c'est juste le nom de la variable qui change
