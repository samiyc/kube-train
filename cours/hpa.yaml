apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kube-train-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kube-train-deployment
  minReplicas: 1
  maxReplicas: 2  # Limité au quota GCP gratuit (1 pod actif + 1 max lors du scaling)
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # Seuil relevé à 70% (évite de scaler trop vite avec peu de ressources)
