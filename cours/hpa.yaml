apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kube-train-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kube-train-deployment
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50 # Le seuil déclencheur (50% de la "request" définie plus haut)
