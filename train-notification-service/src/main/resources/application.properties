spring.application.name=train-notification-service
server.port=8081

# --- Kafka Consumer ---
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest

# Désérialisation : StringDeserializer + conversion manuelle (Jackson 3 / Spring Boot 4)
# Le JsonDeserializer de spring-kafka référence encore Jackson 2.x (com.fasterxml),
# incompatible avec Spring Boot 4 qui utilise Jackson 3 (tools.jackson).
# Pattern courant en prod : on reçoit le JSON en String, on désérialise manuellement.
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
