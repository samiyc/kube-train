# Docker Compose — Kafka en mode KRaft (sans Zookeeper)
#
# 🎯 Concepts clés :
#  - KRaft : nouveau mode de consensus Kafka (remplace Zookeeper depuis Kafka 3.3+)
#  - Un seul nœud qui est à la fois broker ET controller (dev only, pas prod !)
#  - Le topic est créé automatiquement par l'application Spring via NewTopic bean
#
# Usage :
#   docker compose up -d       # Démarrer Kafka
#   docker compose logs -f     # Voir les logs
#   docker compose down        # Arrêter
#   docker compose down -v     # Arrêter + supprimer les données

services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka-kube-train
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # ://:port (sans host) = bind sur toutes les interfaces sans 0.0.0.0 explicite
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # Replication factor = 1 car un seul nœud (en prod = 3 minimum)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # ID du cluster (fixe pour éviter de regénérer à chaque restart)
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
